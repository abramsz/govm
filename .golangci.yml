version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
  settings:
    errcheck:
      exclude-functions:
        - (*archive/tar.Writer).Close
        - (*archive/zip.Writer).Close
        - (*archive/zip.ReadCloser).Close
        - (*compress/gzip.Writer).Close
        - (*compress/gzip.Reader).Close
        - (*os.File).Close
        - (*text/tabwriter.Writer).Flush
        - (io.Closer).Close
        - os.Remove
        - os.RemoveAll
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
